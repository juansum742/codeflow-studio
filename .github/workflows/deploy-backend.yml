name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml

jobs:
  deploy-worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check backend provisioning
        id: backend-config
        shell: bash
        run: |
          if grep -q "REPLACE_WITH_D1_DATABASE_ID" backend/wrangler.jsonc; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Backend deploy skipped until backend/wrangler.jsonc has a real D1 database_id."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply D1 migrations
        if: steps.backend-config.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          wranglerVersion: 4.81.0
          command: d1 migrations apply DB --remote --config wrangler.jsonc

      - name: Deploy Worker
        if: steps.backend-config.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: backend
          wranglerVersion: 4.81.0
          command: deploy --config wrangler.jsonc
          secrets: |
            ADMIN_PASSWORD
            SESSION_SECRET
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Backend deploy skipped
        if: steps.backend-config.outputs.ready != 'true'
        run: echo "Set a real D1 database_id in backend/wrangler.jsonc to enable automatic backend deploys."
